name: Generate News Articles

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'news/posts/**.md'
      - 'news/templates/**'
      - 'news/build_news.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown

      - name: Compile Markdown to HTML
        run: |
          python news/build_news.py

      - name: Commit and Push Compiled HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news/posts/*.html news/index.html
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto-generated news articles from Markdown [skip ci]"
            git push
          else
            echo "No compiled files changed. Skipping push."
          fi
